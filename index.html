

<!DOCTYPE html>
<html>
<head>
    <title>ShreePapd Mobile Shoppe</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
      
        body {
        font-family: Arial;
        background: linear-gradient(to right, #4facfe, #00f2fe);
        }

        .app {
            width: 100%;
            max-width: 360px;
            background: white;
            border-radius: 25px;
            margin: 40px auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            overflow: hidden;
            text-align: center;
        }

        .header {
            background: linear-gradient(to right, #007bff, #00c6ff);
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }

        .content {
            padding: 20px;
            text-align: center;
        }
        .stars {
        color: #fbbc04;
        font-size: 30px;
        font-weight: bold;
        }

        textarea {
            width: 90%;
            height: 100px;
            border-radius: 12px;
            border: 3px solid #ccc;
            padding: 10px;
            font-size: 17px;
            resize: none;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
        }

        .primary {
            background: #007bff;
            color: white;
        }

        .secondary {
            background: #e0e0e0;
        }
        p{
            font-family:'Times New Roman', Times, serif ;
            font-weight:bolder;
        }
          h1{
            text-align: center;
            background: linear-gradient(to right, #007bff, #00c6ff);
            color: white;
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
          }

        .footer {
            font-size: 12px;
            color: gray;
            margin-top: 10px;
        }
    </style>
</head>

<body > 
    
<h1>Shripad Mobiles </h1>
<div class="app">


    <div class="header">
        📱 Shripad Mobiles
    </div>

    <div class="content">

        <div class="stars">★ ★ ★ ★ ★</div>

        <p>Give your REVIEW</p>

        <textarea id="reviewText"></textarea>

        <button class="primary" onclick="quickReview()">🚀 Submit Review</button>

        <button class="secondary" onclick="generateReview()">🔄 Change Review</button>

        <div class="footer">
            Tap submit → Paste → Done ✅
        </div>

    </div>

</div>

<script>

const reviews = [
 
"Excellent service! Got my phone repaired within minutes. Highly recommended.",
"Very friendly staff and genuine products. Best mobile shop in the area.",
"Great experience! They helped me choose the perfect phone within my budget.",
"Quick service and very reasonable prices. Will definitely visit again.",
"Best place for mobile accessories. Quality products at affordable rates.",
"Super fast repair service. My phone works like new now!",
"Very professional and honest shop owner. No unnecessary charges.",
"Wide range of mobiles and accessories available. Loved the service.",
"Good customer support and genuine guidance. Highly satisfied.",
"One of the most trusted mobile shops nearby.",
"Affordable pricing and great deals on new phones.",
"Staff is very helpful and polite. Explained everything clearly.",
"Got my screen replaced here. Excellent work quality.",
"Best shop for buying mobiles and repairing them.",
"Fast service and original spare parts used.",
"Very good experience overall. Worth visiting.",
"Honest pricing and quick response. Highly recommended.",
"They provide the best service in minimum time.",
"Great place for mobile servicing and accessories.",
"My go-to shop for all mobile needs. Never disappointed."
];

function generateReview() {
    let randomIndex = Math.floor(Math.random() * reviews.length);
    document.getElementById("reviewText").value = reviews[randomIndex];
}

window.onload = generateReview;


function quickReview() {

    

    let text = document.getElementById("reviewText");

    text.select();
    document.execCommand("copy");

    alert("!! Now going to Google.!!");

    window.open("https://g.page/r/CRRKvpKriOy8ECk/review", "_blank");
}
 </script>

</body>
</html>
